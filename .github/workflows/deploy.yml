name: Deploy Openmind

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint:ci

  deploy:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Get code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and push app image
      - name: Build and Push App
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          build-args: |
            NUXT_PUBLIC_APP_URL=${{ vars.NUXT_PUBLIC_APP_URL }}
            NUXT_PUBLIC_APP_VERSION=${{ vars.NUXT_PUBLIC_APP_VERSION }}
            NUXT_PUBLIC_SITE_URL=${{ vars.NUXT_PUBLIC_SITE_URL }}
          tags: |
            ghcr.io/ismael-rakotondrazaka/openmind:latest
            ghcr.io/ismael-rakotondrazaka/openmind:${{ github.sha }}

      # 4. Build and push setup image
      - name: Build and Push Setup
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.setup
          push: true
          provenance: false
          tags: |
            ghcr.io/ismael-rakotondrazaka/openmind:setup

      # 5. Trigger boot repo deploy
      - name: Trigger Boot Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.BOOT_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/${{ vars.BOOT_REPO }}/actions/workflows/deploy.yml/dispatch" \
            -d '{"ref":"main"}'
